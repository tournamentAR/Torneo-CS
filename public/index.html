<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torneos CS — Equipos, Llaves y Resultados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="scanner-line" aria-hidden="true"></div>
    <header class="header">
      <div class="container header__inner">
        <div>
          <h1 class="title">Torneos Counter-Strike</h1>
          <p class="subtitle">Equipos confirmados, llave y resultados (solo lectura).</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end">
          <button id="btnFull" class="pill" type="button" style="cursor:pointer"><strong>Pantalla completa</strong></button>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="card">
        <div class="card__header">
          <h2 class="card__title">Torneos</h2>
          <p class="card__hint">Actualiza en vivo cuando cambias en el panel.</p>
        </div>

        <div class="split">
          <div>
            <div id="tournamentList" class="list" aria-live="polite"></div>
          </div>

          <div>
            <div id="selectedTournamentEmpty" class="empty">
              <p><strong>Selecciona un torneo</strong> para ver equipos, llave y resultados.</p>
            </div>

            <div id="selectedTournamentPanel" class="panel hidden">
              <div class="panel__header">
                <div>
                  <h3 id="selectedTournamentTitle" class="panel__title"></h3>
                  <p id="selectedTournamentMeta" class="panel__meta"></p>
                </div>
              </div>

              <div class="grid2">
                <div class="card card--inner">
                  <h4 class="sectionTitle">Equipos</h4>
                  <div id="teamList" class="list" aria-live="polite"></div>
                </div>
                <div class="card card--inner">
                  <h4 class="sectionTitle">Llave y resultados</h4>
                  <div id="bracket" class="bracket"></div>
                  <p id="bracketHint" class="muted small"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span class="muted">Solo lectura.</span>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
